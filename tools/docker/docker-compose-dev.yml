services:
  frontend:
    container_name: frontend-dev
    build:
      context: ../../frontend
      target: dev
    volumes:
      - ../../frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    working_dir: /app
    command: [ "npm", "run", "dev", "--", "--host" ]
    restart: unless-stopped
