services:
  frontend:
    container_name: frontend-dev
    build:
      context: ../../frontend
      target: dev
      args:
        # - VITE_CRYPTO_KEY=${CRYPTO_KEY}
        - VITE_URL=${URL_DEV}
        - VITE_API_BASE=${API_BASE_DEV}
        - VITE_EMAIL=${EMAIL}
    environment:
      # VITE_CRYPTO_KEY: ${CRYPTO_KEY}
      VITE_URL: ${URL_DEV}
      VITE_API_BASE: ${API_BASE_DEV}
      VITE_EMAIL: ${EMAIL}
    volumes:
      - ../../frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    working_dir: /app
    command: [ "npm", "run", "dev", "--", "--host" ]
    restart: unless-stopped
