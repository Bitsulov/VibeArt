services:
  frontend:
    container_name: frontend
    build:
      context: ../../frontend
      target: prod
      args:
#        - VITE_CRYPTO_KEY=${CRYPTO_KEY}
        - VITE_URL=${URL_PROD}
        - VITE_API_BASE=${API_BASE_PROD}
        - VITE_EMAIL=${EMAIL}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  nginx:
    container_name: nginx
    image: nginx:1.30-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
