server {
    listen 80;
    server_name localhost;

    # gzip compression of files
    gzip on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_vary on;

    # files caches (1 year)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        resolver 127.0.0.11 valid=10s;
        set $upstream http://frontend:3000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # API documentation
    location = /swagger-ui/ {
        return 302 /swagger-ui/index.html;
    }

    location ^~ /swagger-ui/ {
        proxy_pass http://main-service:8080/swagger-ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /v3/api-docs {
        proxy_pass http://main-service:8080/v3/api-docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API
    location /api/ {
        proxy_pass http://main-service:8080;
        # pass error to client
        proxy_intercept_errors off;

        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # web-client (frontend-container)
    location / {
        resolver 127.0.0.11 valid=10s;
        set $upstream http://frontend:3000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # if nginx down
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }
}
